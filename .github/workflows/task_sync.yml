name: Daily Task Repeater Bot

# This triggers the bot every day at 08:00 UTC (4:00 AM EST)
on:
  schedule:
    - cron: '0 8 * * *'
  # This allows you to manually trigger the bot from the GitHub website for testing
  workflow_dispatch:

jobs:
  sync_tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib toml

      - name: Reconstruct Secrets File
        env:
          SECRETS_CONTENT: ${{ secrets.STREAMLIT_SECRETS }}
        run: |
          mkdir -p .streamlit
          echo "$SECRETS_CONTENT" > .streamlit/secrets.toml

      - name: Run Repeater Bot
        run: python repeater_cron.py
